<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum da Copa — URE Caieiras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0a2f6c 0%,#041a3a 100%);min-height:100vh;padding:12px;color:#e2e8f0}
.mc{max-width:1340px;margin:0 auto;background:#0f1a24;border-radius:36px;padding:18px;box-shadow:0 30px 35px rgba(0,0,0,.5),inset 0 1px 4px rgba(255,255,200,.06);border:1px solid #d32f2f;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.02;pointer-events:none;border-radius:36px}

.hdr{display:flex;justify-content:space-between;align-items:center;background:rgba(10,47,108,.9);backdrop-filter:blur(6px);padding:12px 22px;border-radius:60px;margin-bottom:14px;flex-wrap:wrap;gap:10px;position:relative;z-index:2}
.logo-a{display:flex;align-items:center;gap:10px}
.logo-a img{height:46px;background:#fff;padding:3px;border-radius:10px}
.logo-t{font-size:.9rem;font-weight:600;color:#ffec9e;line-height:1.2}
.logo-t small{display:block;font-size:.6rem;font-weight:400;color:#8bafd4;letter-spacing:.04em}
.tb{background:#d32f2f;color:#fff;padding:6px 16px;border-radius:3rem;font-weight:700;letter-spacing:.8px;font-size:.75rem;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tb .d{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:bl 1.5s ease infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.pn{position:sticky;top:0;z-index:100;display:flex;gap:4px;padding:8px 4px;overflow-x:auto;background:rgba(15,26,36,.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:14px;scrollbar-width:none;border-radius:16px}
.pn::-webkit-scrollbar{display:none}
.pl{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#94a3b8;font-size:.72rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all .25s;white-space:nowrap}
.pl:hover{background:rgba(255,255,255,.05);color:#fff}
.pl .c{font-family:'JetBrains Mono',monospace;font-size:.55rem;padding:1px 5px;border-radius:5px;background:rgba(255,255,255,.05)}
.pl[data-s="done"]{border-color:#4ade80;color:#4ade80}

.cb{background:rgba(10,47,108,.35);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:18px 16px;margin-bottom:14px;position:relative;z-index:2;animation:fu .5s ease .15s forwards;opacity:0}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.cl{font-family:'JetBrains Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#60a5fa;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.cl::before{content:'>'}color:#ffec9e;font-weight:700}
.cr{display:flex;gap:8px}
.ci{flex:1;background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:1rem;color:#fff;letter-spacing:.1em;text-transform:uppercase;outline:none;transition:border-color .3s,box-shadow .3s}
.ci::placeholder{color:#64748b;font-size:.75rem;letter-spacing:.05em;text-transform:none}
.ci:focus{border-color:#60a5fa;box-shadow:0 0 14px rgba(96,165,250,.2)}
.ci.sh{border-color:#ef4444;animation:sh .4s ease}
.ci.gl{border-color:#4ade80;box-shadow:0 0 18px rgba(74,222,128,.2)}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.btn{background:linear-gradient(135deg,#d32f2f,#b71c1c);border:none;border-radius:10px;padding:12px 22px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;white-space:nowrap}
.btn:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(211,47,47,.3)}
.btn:active{transform:scale(.97)}
.cm{margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:.68rem;min-height:16px}
.cm.e{color:#f87171}.cm.o{color:#4ade80}

.op{display:flex;align-items:center;gap:12px;margin-bottom:16px;animation:fu .5s ease .3s forwards;opacity:0;position:relative;z-index:2}
.pl2{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.pl2 b{color:#ffec9e;font-size:.82rem}
.pt{flex:1;height:8px;background:rgba(0,0,0,.3);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.pf{height:100%;width:0;background:linear-gradient(90deg,#d32f2f,#ffec9e,#4ade80,#60a5fa);border-radius:8px;transition:width .6s cubic-bezier(.23,1,.32,1)}
.pp{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#ffec9e;min-width:46px;text-align:right}

.gs{margin-bottom:24px;border-radius:20px;overflow:hidden;position:relative;z-index:2;scroll-margin-top:60px;animation:fu .4s ease .35s forwards;opacity:0}
.gh{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;background:rgba(10,47,108,.45);border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap}
.gl2{display:flex;align-items:center;gap:8px}
.gi{font-size:1.3rem}
.gt h2{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.05em;color:#fff;line-height:1.1}
.gt .gs2{font-size:.68rem;color:#94a3b8;font-weight:300}
.gr{display:flex;align-items:center;gap:7px}
.gp{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:#ffec9e}
.gb{width:60px;height:4px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.gf{height:100%;border-radius:4px;transition:width .5s}

.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;padding:14px;background:rgba(0,0,0,.12)}

.ss{position:relative;aspect-ratio:3/4;background:rgba(0,0,0,.22);border:2px dashed rgba(255,255,255,.07);border-radius:12px;overflow:hidden;transition:border-color .3s,box-shadow .3s,transform .3s;cursor:pointer}
.ss:hover:not(.r){border-color:rgba(255,236,158,.2);transform:translateY(-2px)}
.ss.r{border-style:solid;border-color:var(--sc,#ffec9e);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.ss.r:hover{transform:none}

.sp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:opacity .4s;background:repeating-linear-gradient(45deg,transparent,transparent 9px,rgba(255,255,255,.012) 9px,rgba(255,255,255,.012) 10px)}
.ss.r .sp{opacity:0;pointer-events:none}
.sn{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:rgba(255,255,255,.07);line-height:1}
.sq{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:rgba(255,255,255,.1)}
.sh2{font-family:'JetBrains Mono',monospace;font-size:.45rem;color:rgba(255,255,255,.12);text-transform:uppercase;letter-spacing:.06em}

.sf{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transform:scale(.85) rotateY(90deg);transition:opacity .5s,transform .55s cubic-bezier(.23,1,.32,1);pointer-events:none}
.ss.r .sf{opacity:1;transform:scale(1) rotateY(0);pointer-events:auto}
.sfb{position:absolute;inset:0;background:linear-gradient(145deg,var(--c1,#1a3a5c),var(--c2,#0a1a2c))}
.sfb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,.15) 45%,rgba(0,0,0,.65) 100%)}
.sht{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:8px 10px 6px}
.sl{width:24px;height:24px;border-radius:6px;object-fit:cover;border:1px solid rgba(255,236,158,.35);background:#fff;padding:1px}
.sm{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.snm{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;line-height:1;color:#ffec9e}
.stag{font-family:'JetBrains Mono',monospace;font-size:.38rem;text-transform:uppercase;letter-spacing:.06em;background:rgba(0,0,0,.4);padding:1px 5px;border-radius:5px;color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.08);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sfl{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.sfe{font-size:2.8rem;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3))}
.scn{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.05em;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5);text-align:center}
.sbt{position:relative;z-index:2;padding:6px 10px;border-top:1px solid rgba(255,255,255,.06)}
.ssch{font-size:.58rem;font-weight:600;color:#fff;text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.4);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sgr{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:2px}
.sgnota{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:#ffec9e;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.sgstars{display:flex;gap:1px}
.sgstars svg{width:7px;height:7px;fill:#ffec9e;opacity:.8}
.sac{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1,#ffec9e),var(--c2,#60a5fa))}
.swm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:5rem;opacity:.06;z-index:1;pointer-events:none;filter:grayscale(.2)}

.rf{position:absolute;inset:0;background:radial-gradient(circle,rgba(255,236,158,.35),transparent 60%);opacity:0;pointer-events:none;z-index:10}
.ss.pp2 .rf{animation:bu .6s ease forwards}
@keyframes bu{0%{opacity:0;transform:scale(.4)}30%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(2)}}
@keyframes skp{0%{opacity:0;transform:scale(.3) rotateY(180deg)}60%{opacity:1;transform:scale(1.04) rotateY(-4deg)}100%{opacity:1;transform:scale(1) rotateY(0)}}
.ss.pp2 .sf{animation:skp .6s cubic-bezier(.23,1,.32,1) forwards}

.gdone{display:none;padding:12px 18px;text-align:center;border-top:1px solid rgba(255,255,255,.03);background:rgba(74,222,128,.03)}
.gdone.show{display:block}
.gdone p{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#4ade80;letter-spacing:.05em}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:10000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:#0f1a24;border:1px solid rgba(255,255,255,.1);border-radius:24px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .4s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-x{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.modal-x:hover{background:rgba(239,68,68,.2);border-color:#ef4444;color:#f87171}
.m-hdr{padding:24px 24px 16px;text-align:center;position:relative}
.m-flag{font-size:4rem;line-height:1;margin-bottom:8px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.m-country{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;color:#94a3b8;margin-bottom:2px}
.m-school{font-size:.95rem;font-weight:700;color:#fff;line-height:1.3;margin-bottom:4px}
.m-code{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:#64748b;letter-spacing:.08em}
.m-nota-box{display:inline-flex;flex-direction:column;align-items:center;background:rgba(255,236,158,.08);border:1px solid rgba(255,236,158,.15);border-radius:16px;padding:12px 28px;margin:12px 0}
.m-nota-num{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;color:#ffec9e}
.m-nota-label{font-family:'JetBrains Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8}
.m-nota-stars{display:flex;gap:2px;margin-top:4px}
.m-nota-stars svg{width:12px;height:12px;fill:#ffec9e}
.m-body{padding:0 24px 24px}
.m-section-title{font-family:'JetBrains Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:#60a5fa;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.m-section-title::before{content:''}width:4px;height:4px;border-radius:50%;background:#60a5fa}
.m-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.m-row-label{font-size:.72rem;font-weight:600;color:#94a3b8;min-width:110px;white-space:nowrap}
.m-row-bar{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden}
.m-row-fill{height:100%;border-radius:6px;transition:width .6s ease}
.m-row-val{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:700;color:#fff;min-width:50px;text-align:right;white-space:nowrap}
.m-footer{padding:14px 24px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:10px}
.m-footer img{width:30px;height:30px;border-radius:6px;background:#fff;padding:1px}
.m-footer span{font-size:.6rem;color:#4a6a8a;letter-spacing:.04em}

/* ADMIN AREA */
.admin-zone{margin-top:28px;position:relative;z-index:2;animation:fu .4s ease .5s forwards;opacity:0}
.admin-gate{text-align:center;padding:24px 20px;background:rgba(10,47,108,.2);border:1px dashed rgba(255,255,255,.06);border-radius:14px;cursor:pointer;transition:all .3s}
.admin-gate:hover{background:rgba(10,47,108,.3);border-color:rgba(255,236,158,.15)}
.admin-gate-icon{font-size:1.4rem;margin-bottom:6px;opacity:.3}
.admin-gate-text{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#4a6a8a;letter-spacing:.1em;text-transform:uppercase}
.admin-pw-row{display:none;margin-top:12px;justify-content:center;gap:8px;align-items:center}
.admin-pw-row.show{display:flex}
.admin-pw{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:#fff;outline:none;width:200px;text-align:center;letter-spacing:.15em}
.admin-pw:focus{border-color:#60a5fa}
.admin-pw-btn{background:rgba(255,236,158,.1);border:1px solid rgba(255,236,158,.2);border-radius:8px;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#ffec9e;cursor:pointer;transition:all .2s}
.admin-pw-btn:hover{background:rgba(255,236,158,.2)}
.admin-pw-msg{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:#f87171;margin-top:6px;display:none}
.admin-pw-msg.show{display:block}

.codes-area{display:none;margin-top:14px}
.codes-area.open{display:block;animation:fu .4s ease forwards}

.codes-sec{margin-bottom:10px;background:rgba(10,47,108,.25);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden}
.codes-sec summary{padding:14px 18px;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.04em;color:#ffec9e;cursor:pointer;list-style:none;display:flex;align-items:center;gap:6px;transition:background .2s}
.codes-sec summary::-webkit-details-marker{display:none}
.codes-sec summary::before{content:'▸';transition:transform .2s;font-size:.8rem}
.codes-sec[open] summary::before{transform:rotate(90deg)}
.codes-sec summary:hover{background:rgba(255,236,158,.03)}
.ct{width:100%;border-collapse:collapse}
.ct th{font-family:'JetBrains Mono',monospace;font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:#60a5fa;text-align:left;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
.ct td{font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.02);color:#94a3b8}
.ct tr:last-child td{border-bottom:none}
.ct .cv{color:#ffec9e;font-weight:700;letter-spacing:.04em}
.ct .si{display:inline-flex;width:14px;height:14px;border-radius:50%;align-items:center;justify-content:center;font-size:.5rem}
.si.lk{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.si.ul{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.2)}

.cb2{display:none;background:linear-gradient(135deg,rgba(10,47,108,.5),rgba(211,47,47,.15));border:2px solid #ffec9e;border-radius:18px;padding:26px;text-align:center;margin-top:22px;position:relative;z-index:2;animation:bi .7s ease}
@keyframes bi{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.cb2.show{display:block}
.cb2 h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#ffec9e;letter-spacing:.06em;margin-bottom:4px}
.cb2 p{color:#94a3b8;font-size:.9rem}

.cbox{position:fixed;inset:0;pointer-events:none;z-index:100000;overflow:hidden}
.cp{position:absolute;top:-20px;opacity:0;animation:cf 2s ease forwards}
@keyframes cf{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.4)}}

footer{text-align:center;margin-top:20px;padding:.8rem;color:#3a5a7a;font-size:.65rem;border-top:1px solid rgba(255,255,255,.03);position:relative;z-index:2}

@media(max-width:900px){.sg{grid-template-columns:repeat(3,1fr);gap:8px}}
@media(max-width:640px){
.mc{padding:10px;border-radius:20px}
.hdr{border-radius:28px;padding:8px 14px;flex-direction:column;align-items:flex-start}
.sg{grid-template-columns:repeat(2,1fr);gap:6px;padding:8px}
.cr{flex-direction:column}
.sfe{font-size:2.2rem}
.scn{font-size:.72rem}
.sgnota{font-size:1.1rem}
.gh{padding:10px 12px}
.modal{max-height:85vh;border-radius:18px}
.m-hdr{padding:18px 18px 12px}
.m-body{padding:0 18px 18px}
.m-row-label{min-width:85px;font-size:.65rem}
.m-row-val{font-size:.65rem;min-width:42px}
.admin-pw{width:160px}
}
@media(max-width:380px){.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="mc">
  <div class="hdr">
    <div class="logo-a">
      <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg" alt="Logo 3D Seduc">
      <div class="logo-t">Álbum da Copa da Formação<small>URE CAIEIRAS — Seduc SP</small></div>
    </div>
    <div class="tb"><span class="d"></span>68 Escolas</div>
  </div>
  <nav class="pn" id="pNav"></nav>
  <div class="cb">
    <div class="cl">Cole o código da figurinha para revelar</div>
    <div class="cr">
      <input type="text" class="ci" id="ci" placeholder="Digite o código..." maxlength="12" autocomplete="off" spellcheck="false">
      <button class="btn" id="cb">REVELAR</button>
    </div>
    <div class="cm" id="cm"></div>
  </div>
  <div class="op">
    <span class="pl2">Reveladas: <b id="oc">0</b> / <b id="ot">68</b></span>
    <div class="pt"><div class="pf" id="of"></div></div>
    <span class="pp" id="op">0%</span>
  </div>
  <div id="gc"></div>
  <div class="cb2" id="banner"><h2>&#9733; Álbum Completo! &#9733;</h2><p>Todas as 68 figurinhas reveladas!</p></div>

  <!-- ADMIN GATE — Códigos protegidos por senha -->
  <div class="admin-zone" id="adminZone">
    <div class="admin-gate" id="adminGate">
      <div class="admin-gate-icon">🔐</div>
      <div class="admin-gate-text">Painel do Formador</div>
      <div class="admin-pw-row" id="adminPwRow">
        <input type="password" class="admin-pw" id="adminPw" placeholder="Senha" maxlength="20">
